  <script>
    (function () {
      'use strict';

      /** 封面目录与 CSV 配置（assets/covers/） */
      var COVERS_BASE = 'assets/covers/';
      var COVER_CSV_URL = COVERS_BASE + 'cover_copy.csv';
      var FALLBACK_IMAGE_FILE = 'cover-forest.png';

      var FALLBACK_SCENE = {
        image: COVERS_BASE + FALLBACK_IMAGE_FILE,
        name: '层叠山林藏着无尽松弛',
        coords: '山野包容所有细碎情绪',
        alt: '层叠山林藏着无尽松弛',
      };

      var activeScene = FALLBACK_SCENE;
      var csvFallbackScene = FALLBACK_SCENE;
      var coverCatalog = null;
      var lastCoverDateKey = null;

      function parseCSVLine(line) {
        var result = [];
        var current = '';
        var inQuotes = false;
        var i;

        for (i = 0; i < line.length; i++) {
          var ch = line[i];
          if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
          } else {
            current += ch;
          }
        }
        result.push(current.trim());
        return result;
      }

      /** 解析 cover_copy.csv：Image name → 图片，Dscribe → 地点名，Location → 坐标文案 */
      function parseCoverCSV(text) {
        var lines = text.split(/\r?\n/).filter(function (line) {
          return line.trim();
        });
        if (lines.length < 2) return [];

        var headers = parseCSVLine(lines[0]);
        var imageIdx = headers.indexOf('Image name');
        var describeIdx = headers.indexOf('Dscribe');
        if (describeIdx < 0) describeIdx = headers.indexOf('Describe');
        var locationIdx = headers.indexOf('Location');

        if (imageIdx < 0) return [];

        var catalog = [];
        var i;

        for (i = 1; i < lines.length; i++) {
          var cols = parseCSVLine(lines[i]);
          var imageFile = cols[imageIdx];
          if (!imageFile) continue;

          catalog.push({
            image: COVERS_BASE + imageFile,
            imageFile: imageFile,
            name: describeIdx >= 0 ? (cols[describeIdx] || '') : '',
            coords: locationIdx >= 0 ? (cols[locationIdx] || '') : '',
            alt: describeIdx >= 0 ? (cols[describeIdx] || 'Cover') : 'Cover',
          });
        }

        return catalog;
      }

      function findFallbackScene(catalog) {
        var i;
        for (i = 0; i < catalog.length; i++) {
          if (catalog[i].imageFile === FALLBACK_IMAGE_FILE) {
            return catalog[i];
          }
        }
        return FALLBACK_SCENE;
      }

      function verifyImageUrl(url) {
        return new Promise(function (resolve) {
          var probe = new Image();
          probe.onload = function () { resolve(true); };
          probe.onerror = function () { resolve(false); };
          probe.src = url;
        });
      }

      function pickRandomCover(catalog) {
        return catalog[Math.floor(Math.random() * catalog.length)];
      }

      /** 从目录中随机解析一条封面（含图片可用性校验） */
      function resolveRandomScene(catalog) {
        var fallbackScene = findFallbackScene(catalog);
        var picked = pickRandomCover(catalog);
        return verifyImageUrl(picked.image).then(function (ok) {
          csvFallbackScene = fallbackScene;
          return ok ? picked : fallbackScene;
        });
      }

      /** 拉取并缓存 CSV 封面目录 */
      function loadCoverCatalog() {
        if (coverCatalog && coverCatalog.length) {
          return Promise.resolve(coverCatalog);
        }

        return fetch(COVER_CSV_URL)
          .then(function (res) {
            if (!res.ok) throw new Error('csv fetch failed');
            return res.text();
          })
          .then(function (text) {
            var catalog = parseCoverCSV(text);
            if (!catalog.length) throw new Error('csv empty');
            coverCatalog = catalog;
            csvFallbackScene = findFallbackScene(catalog);
            return catalog;
          });
      }

      /** 随机换封面（刷新 / 跨天共用） */
      function rotateCoverScene() {
        if (!coverCatalog || !coverCatalog.length) {
          activeScene = FALLBACK_SCENE;
          applyScene(FALLBACK_SCENE);
          return Promise.resolve(FALLBACK_SCENE);
        }

        return resolveRandomScene(coverCatalog).then(function (scene) {
          activeScene = scene;
          applyScene(scene);
          return scene;
        });
      }

      /** 首次加载：读 CSV + 随机选封面 */
      function loadActiveScene() {
        return loadCoverCatalog()
          .then(function (catalog) {
            return resolveRandomScene(catalog);
          })
          .then(function (scene) {
            activeScene = scene;
            lastCoverDateKey = dateKey(getAppDate());
            return scene;
          })
          .catch(function () {
            coverCatalog = null;
            activeScene = FALLBACK_SCENE;
            csvFallbackScene = FALLBACK_SCENE;
            lastCoverDateKey = dateKey(getAppDate());
            return FALLBACK_SCENE;
          });
      }

      /** 每天 00:00 跨天后自动随机换封面与文案 */

        setInterval(function () {
          var todayKey = dateKey(getAppDate());
          if (!lastCoverDateKey || todayKey === lastCoverDateKey) return;

          lastCoverDateKey = todayKey;
          rotateCoverScene();
          renderCalendar(getAppDate());
          syncDailyWorkers(getAppDate());
          rotateClockQuote();
          renderClockDate(getAppDate());

      /** 今日工位占位图标（首次上班打卡 / 番茄钟随机解锁） */
      var WORKER_ICONS = {

        salad: { src: 'assets/blind-box/worker-salad.png', alt: '沙拉' },

      var STARTER_WORKERS = ['cheese', 'crab', 'salad'];

      function normalizeWorkerEntry(entry) {
        if (typeof entry === 'string') {
          return { id: entry, size: 'medium' };
        }
        if (entry && entry.id) {
          return { id: entry.id, size: entry.size || 'medium' };
        }
        return null;

      function normalizeWorkersList(list) {
        var normalized = [];
        var i;
        for (i = 0; i < list.length; i++) {

        if (size === 'small') return 'worker-icon--small';
        if (size === 'large') return 'worker-icon--large';
        return 'worker-icon--medium';

      function pad2(n) {
        return n < 10 ? '0' + n : String(n);
      }

      function daysInMonth(year, monthIndex) {
        return new Date(year, monthIndex + 1, 0).getDate();
      }

      /** 浏览器本地时间 */
      function getAppDate() {

        return date.getFullYear() + '-' + pad2(date.getMonth() + 1) + '-' + pad2(date.getDate());
      }

      function renderCalendar(date) {
        var year = date.getFullYear();
        var month = date.getMonth();
        var today = date.getDate();
        var total = daysInMonth(year, month);
        var firstDow = new Date(year, month, 1).getDay();

        document.getElementById('ym-label').textContent = year + '/' + pad2(month + 1);
        applyScene(scene);

          var empty = document.createElement('div');
          empty.className = 'cal-cell';
          empty.setAttribute('aria-hidden', 'true');
          grid.appendChild(empty);
        }

        for (i = 1; i <= total; i++) {
          var cell = document.createElement('div');
          cell.className = 'cal-cell' + (i === today ? ' is-today' : '');
          cell.setAttribute('role', 'gridcell');
          cell.textContent = String(i);
          if (i === today) {
            cell.setAttribute('aria-current', 'date');
          }
          grid.appendChild(cell);

        var filled = firstDow + total;
        for (i = filled; i < 42; i++) {

      function updateWorkersOverflow() {
        var row = document.getElementById('today-workers');
        var ellipsis = document.getElementById('workers-ellipsis');
        if (!row || !ellipsis) return;

        if (!row.children.length) {
          ellipsis.classList.add('is-hidden');
          return;
        }

        if (row.scrollWidth > row.clientWidth) {
          ellipsis.classList.remove('is-hidden');
        } else {
          ellipsis.classList.add('is-hidden');
        }
      }

      function renderTodayWorkers(workers) {
        var placeholder = document.getElementById('workers-placeholder');
        var countWrap = document.getElementById('workers-count-wrap');
        var countEl = document.getElementById('workers-count');
        var el = document.getElementById('today-workers');
        var ellipsis = document.getElementById('workers-ellipsis');

        if (!workers.length) {
          placeholder.classList.remove('is-hidden');
          countWrap.classList.add('is-hidden');
          el.innerHTML = '';
          ellipsis.classList.add('is-hidden');
          return;
        }

        placeholder.classList.add('is-hidden');
        countWrap.classList.remove('is-hidden');
        countEl.textContent = '+' + workers.length;

        el.innerHTML = '';
        workers.forEach(function (entry) {
          var normalized = normalizeWorkerEntry(entry);
          if (!normalized) return;
          var icon = WORKER_ICONS[normalized.id];
          if (!icon) return;
          var img = document.createElement('img');
          img.src = icon.src;
          img.alt = icon.alt;
          img.className = 'worker-icon ' + workerSizeClass(normalized.size);
          img.onload = updateWorkersOverflow;
          el.appendChild(img);
        });

        if (typeof requestAnimationFrame === 'function') {
          requestAnimationFrame(updateWorkersOverflow);
        } else {
          setTimeout(updateWorkersOverflow, 0);
        }
      }

      /** 首次上班打卡：今日工位为空时随机解锁一个占位图标 */
      function grantStarterWorkerIfNeeded() {
        var workers = getTodayWorkers();
        if (workers.length) return workers;

        var pick = STARTER_WORKERS[Math.floor(Math.random() * STARTER_WORKERS.length)];
        workers.push({ id: pick, size: 'medium' });
        saveTodayWorkers(workers);

        var unlocked = getUnlockedList();
        if (unlocked.indexOf(pick) === -1) {
          unlocked.push(pick);
          saveUnlockedList(unlocked);
        }

        return workers;
      }

      function syncDailyWorkers(date) {
        var todayKey = dateKey(date);

        var storedDate = localStorage.getItem('workers_date');
        if (storedDate !== todayKey) {
          saveTodayWorkers([]);
          localStorage.setItem('workers_date', todayKey);
        }

        if (!localStorage.getItem('unlocked_list')) {
          saveUnlockedList([]);
        }

        renderTodayWorkers(getTodayWorkers());

      /** 底部滑块切换：左=日历 / 中=时钟 / 右=番茄钟 */
      var PAGES = ['calendar', 'clock', 'pomo'];

      function getPageFromUrl() {
        try {
          var params = new URLSearchParams(window.location.search);
          var tab = params.get('tab');
          /* 无 tab 参数：/ 与 /index.html 均视为日历 */
          if (!tab) return 'calendar';
          var key = String(tab).trim().toLowerCase();
          if (PAGES.indexOf(key) >= 0) return key;
        } catch (e) {
          /* URLSearchParams 不可用时回退日历 */
        }
        return 'calendar';
      }

      /** 同步 ?tab= 到地址栏；日历可省略参数，?tab=calendar 与 /、/index.html 等效 */
      function syncPageUrl(page) {
        try {
          var url = new URL(window.location.href);
          if (page === 'calendar') {
            url.searchParams.delete('tab');
          } else {
            url.searchParams.set('tab', page);
          }
          var next = url.pathname + url.search + url.hash;
          var current = window.location.pathname + window.location.search + window.location.hash;
          if (next !== current) {
            window.history.replaceState({ tab: page }, '', next);
          }
        } catch (e) {
          /* 忽略古董浏览器 URL API 失败 */
        }
      }

      function switchPage(page, options) {
        options = options || {};
        var index = PAGES.indexOf(page);
        if (index < 0) return;

        var views = {
          calendar: document.getElementById('view-calendar'),
          clock: document.getElementById('view-clock'),
          pomo: document.getElementById('view-pomo'),
        };

        PAGES.forEach(function (key) {
          views[key].classList.toggle('is-hidden', key !== page);
        });

        var thumb = document.getElementById('page-nav-thumb');
        thumb.style.left = (index * 33.333) + '%';

        var zones = document.querySelectorAll('.page-nav-zone');
        zones.forEach(function (zone) {
          var selected = zone.getAttribute('data-page') === page;
          zone.setAttribute('aria-selected', selected ? 'true' : 'false');
        });

        if (!options.skipUrl) {
          syncPageUrl(page);
        }

        if (page === 'clock' && clockSheepPendingLayout) {
          if (typeof requestAnimationFrame === 'function') {
            requestAnimationFrame(function () {
              layoutClockSheepIfNeeded({ force: false });
            });
          } else {
            layoutClockSheepIfNeeded({ force: false });
          }
        }
      }

      function initPageNav() {
        var zones = document.querySelectorAll('.page-nav-zone');
        zones.forEach(function (zone) {
          zone.addEventListener('click', function () {
            switchPage(zone.getAttribute('data-page'));
          });
        });
        switchPage(getPageFromUrl(), { skipUrl: true });
      }

      /** —— Tab 2 墨水屏时钟 —— */
      var CLOCK_QUOTES = [
        {
          text: 'All complex systems eventually drift toward disorder—but here, the clock moves slowly.',
          author: 'Cyber Cubicle Observation Log',
        },
        {
          text: "If you can't make the perfect call today, go watch those three sheep grazing.",

      var MONTH_NAMES = [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December',
      ];
      var WEEKDAY_NAMES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      var lastClockMinuteKey = null;

      /** —— 时钟页三只小羊随机布局 —— */
      var SHEEP_SIZE_TIERS = ['sm', 'md', 'lg'];
      var SHEEP_LAYOUT_GAP = 8;
      var SHEEP_LAYOUT_MARGIN = 8;
      var SHEEP_MAX_ATTEMPTS = 50;
      var SHEEP_TOP_SAFE = 14;
      var lastSheepHourKey = null;
      var clockSheepLaidOut = false;
      var clockSheepPendingLayout = false;

      function hourKey(date) {
        return dateKey(date) + 'T' + pad2(date.getHours());
      }

      function shuffleArray(list) {
        var arr = list.slice();
        var i = arr.length;
        while (i) {
          var j = Math.floor(Math.random() * i--);
          var tmp = arr[i];
          arr[i] = arr[j];
          arr[j] = tmp;
        }
        return arr;
      }

      function isClockSheepDesktop() {
        return window.matchMedia('(min-width: 1024px) and (min-height: 600px)').matches;
      }

      function getSheepPixelSize(tier) {
        if (isClockSheepDesktop()) {
          if (tier === 'sm') return 36;
          if (tier === 'lg') return 58;
          return 48;
        }
        if (tier === 'sm') return 28;
        if (tier === 'lg') return 48;
        return 38;
      }

      function sheepAabb(left, bottom, size, zoneH) {
        return {
          left: left,
          right: left + size,
          top: zoneH - bottom - size,
          bottom: zoneH - bottom,
        };
      }

      function sheepAabbOverlap(a, b, gap) {
        return !(
          a.right + gap <= b.left ||
          b.right + gap <= a.left ||
          a.bottom + gap <= b.top ||
          b.bottom + gap <= a.top
        );
      }

      function getSheepMaxBottom(size, zoneH) {
        var biasCap = Math.floor(zoneH * 0.55);
        var hardCap = Math.max(0, zoneH - size - SHEEP_TOP_SAFE);
        return Math.min(biasCap, hardCap);
      }

      function applySheepPlacement(img, size, left, bottom, rotate, tier) {
        img.style.width = size + 'px';
        img.style.height = size + 'px';
        img.style.left = left + 'px';
        img.style.bottom = bottom + 'px';
        img.style.transform = 'rotate(' + rotate + 'deg)';
        img.setAttribute('data-sheep-size', tier);
      }

      function layoutClockSheep() {
        var zone = document.getElementById('clock-sheep');
        if (!zone) return false;

        var imgs = zone.querySelectorAll('img');
        if (imgs.length !== 3) return false;

        var zoneW = zone.clientWidth;
        var zoneH = zone.clientHeight;
        if (zoneW < 60 || zoneH < 24) return false;

        var tiers = shuffleArray(SHEEP_SIZE_TIERS);
        var margin = SHEEP_LAYOUT_MARGIN;
        var placed = [];
        var t;
        var allOk = true;

        for (t = 0; t < 3; t++) {
          var size = getSheepPixelSize(tiers[t]);
          var maxBottom = getSheepMaxBottom(size, zoneH);
          var ok = false;
          var attempt;
          for (attempt = 0; attempt < SHEEP_MAX_ATTEMPTS; attempt++) {
            var left = margin + Math.random() * Math.max(0, zoneW - size - margin * 2);
            var bottom = maxBottom > 0 ? Math.random() * maxBottom : 0;
            var rotate = Math.random() * 16 - 8;
            var box = sheepAabb(left, bottom, size, zoneH);
            var hit = false;
            var p;
            for (p = 0; p < placed.length; p++) {
              if (sheepAabbOverlap(box, placed[p].box, SHEEP_LAYOUT_GAP)) {
                hit = true;
                break;
              }
            }
            if (!hit) {
              placed.push({
                img: imgs[t],
                size: size,
                left: left,
                bottom: bottom,
                rotate: rotate,
                tier: tiers[t],
                box: box,
              });
              ok = true;
              break;
            }
          }
          if (!ok) {
            allOk = false;
            break;
          }
        }

        if (!allOk) {
          var slots = shuffleArray([
            { leftFrac: 0.1, bottomFrac: 0.05 },
            { leftFrac: 0.4, bottomFrac: 0.22 },
            { leftFrac: 0.7, bottomFrac: 0.08 },
          ]);
          placed = [];
          for (t = 0; t < 3; t++) {
            size = getSheepPixelSize(tiers[t]);
            maxBottom = getSheepMaxBottom(size, zoneH);
            left = Math.min(
              zoneW - size - margin,
              Math.max(margin, slots[t].leftFrac * (zoneW - size))
            );
            bottom = maxBottom > 0
              ? Math.min(maxBottom, slots[t].bottomFrac * maxBottom)
              : 0;
            rotate = Math.random() * 16 - 8;
            placed.push({
              img: imgs[t],
              size: size,
              left: left,
              bottom: bottom,
              rotate: rotate,
              tier: tiers[t],
            });
          }
        }

        for (t = 0; t < placed.length; t++) {
          applySheepPlacement(
            placed[t].img,
            placed[t].size,
            placed[t].left,
            placed[t].bottom,
            placed[t].rotate,
            placed[t].tier
          );
        }

        return true;
      }

      function layoutClockSheepIfNeeded(options) {
        options = options || {};
        var clockView = document.getElementById('view-clock');
        if (!clockView || clockView.classList.contains('is-hidden')) {
          return;
        }

        var now = getAppDate();
        var hKey = hourKey(now);
        var hourChanged = lastSheepHourKey !== null && lastSheepHourKey !== hKey;
        var needLayout = options.force || !clockSheepLaidOut || hourChanged;
        if (!needLayout) return;

        if (!layoutClockSheep()) {
          clockSheepPendingLayout = true;
          return;
        }

        lastSheepHourKey = hKey;
        clockSheepLaidOut = true;
        clockSheepPendingLayout = false;
      }

      function maybeRelayoutClockSheep(date) {
        var hKey = hourKey(date);
        if (lastSheepHourKey === hKey) return;
        layoutClockSheepIfNeeded({ force: true });
      }

      function ordinalDay(n) {
        var mod100 = n % 100;
        if (mod100 >= 11 && mod100 <= 13) return n + 'th';
        switch (n % 10) {
          case 1: return n + 'st';
          case 2: return n + 'nd';
          case 3: return n + 'rd';
          default: return n + 'th';
        }
      }

      function formatClockDate(date) {
        return MONTH_NAMES[date.getMonth()] + ' ' + ordinalDay(date.getDate()) + ', ' + WEEKDAY_NAMES[date.getDay()];
      }

      function formatClockTime(date) {
        var hours24 = date.getHours();
        var hours12 = hours24 % 12;
        if (hours12 === 0) hours12 = 12;
        return {
          time: pad2(hours12) + ':' + pad2(date.getMinutes()),
          ampm: hours24 < 12 ? 'AM' : 'PM',
        };
      }

      function minuteKey(date) {
        return dateKey(date) + 'T' + pad2(date.getHours()) + ':' + pad2(date.getMinutes());
      }

      function renderClockTime(date) {
        var formatted = formatClockTime(date);
        var timeEl = document.getElementById('clock-time');
        var ampmEl = document.getElementById('clock-ampm');
        if (!timeEl || !ampmEl) return;

        if (timeEl.textContent !== formatted.time) {
          timeEl.textContent = formatted.time;
        }
        if (ampmEl.textContent !== formatted.ampm) {
          ampmEl.textContent = formatted.ampm;
        }
      }

      function renderClockDate(date) {
        var dateEl = document.getElementById('clock-date');
        if (!dateEl) return;
        var label = formatClockDate(date);
        if (dateEl.textContent !== label) {
          dateEl.textContent = label;

      function applyClockQuote(quote) {
        var textEl = document.getElementById('clock-quote-text');
        var authorEl = document.getElementById('clock-quote-author');
        if (!textEl || !authorEl || !quote) return;
        textEl.textContent = quote.text;
        authorEl.textContent = '— ' + quote.author;
      }

      function pickRandomQuote() {
        return CLOCK_QUOTES[Math.floor(Math.random() * CLOCK_QUOTES.length)];
      }

      /** 刷新页面或跨天：随机一组文案 */
      function rotateClockQuote() {
        applyClockQuote(pickRandomQuote());
      }

      /** WMO weather code → emoji（Open-Meteo） */
      function weatherCodeToEmoji(code) {
        if (code === 0) return '☀️';
        if (code === 1 || code === 2) return '🌤';
        if (code === 3) return '☁️';
        if (code === 45 || code === 48) return '🌫';
        if (code >= 51 && code <= 67) return '🌧';
        if (code >= 71 && code <= 77) return '❄️';
        if (code >= 80 && code <= 82) return '🌦';
        if (code >= 85 && code <= 86) return '🌨';
        if (code >= 95) return '⛈';
        return '🌤';
      }

      function renderClockWeather(place, emoji, tempRange) {
        var placeEl = document.getElementById('clock-place');
        var iconEl = document.getElementById('clock-weather-icon');
        var tempEl = document.getElementById('clock-weather-temp');
        if (!placeEl || !iconEl || !tempEl) return;

        placeEl.textContent = place || '—';
        iconEl.textContent = emoji ? (' ' + emoji + ' ') : '';
        tempEl.textContent = tempRange || '';
      }

      /**
       * 定位与天气：
       * 浏览器 JS 读不到本机公网 IP，需请求第三方 IP 地理接口（免授权）；
       * 再用 Open-Meteo（免 key）拉当地气温与天气码。
       * 不使用 Geolocation API，避免弹权限框。
       */
      function fetchIpGeo() {
        return fetch('https://ipwho.is/')
          .then(function (res) {
            if (!res.ok) throw new Error('ipwho failed');
            return res.json();
          })
          .then(function (data) {
            if (!data || data.success === false) throw new Error('ipwho invalid');
            var lat = data.latitude;
            var lon = data.longitude;
            if (lat == null || lon == null) throw new Error('no coords');
            return {
              city: data.city || data.region || data.country || '',
              lat: lat,
              lon: lon,
            };
          })
          .catch(function () {
            return fetch('https://get.geojs.io/v1/ip/geo.json')
              .then(function (res) {
                if (!res.ok) throw new Error('geojs failed');
                return res.json();
              })
              .then(function (data) {
                var lat = parseFloat(data.latitude);
                var lon = parseFloat(data.longitude);
                if (isNaN(lat) || isNaN(lon)) throw new Error('geojs no coords');
                return {
                  city: data.city || data.region || data.country || '',
                  lat: lat,
                  lon: lon,
                };
              });
          });
      }

      function loadClockWeather() {
        renderClockWeather('定位中…', '', '');

        return fetchIpGeo()
          .then(function (geo) {
            var weatherUrl =
              'https://api.open-meteo.com/v1/forecast'
              + '?latitude=' + encodeURIComponent(geo.lat)
              + '&longitude=' + encodeURIComponent(geo.lon)
              + '&current=weather_code'
              + '&daily=temperature_2m_max,temperature_2m_min'
              + '&timezone=auto'
              + '&forecast_days=1';

            return fetch(weatherUrl).then(function (res) {
              if (!res.ok) throw new Error('weather failed');
              return res.json();
            }).then(function (weather) {
              var code = weather.current && weather.current.weather_code;
              var mins = weather.daily && weather.daily.temperature_2m_min;
              var maxs = weather.daily && weather.daily.temperature_2m_max;
              var minT = mins && mins.length ? Math.round(mins[0]) : null;
              var maxT = maxs && maxs.length ? Math.round(maxs[0]) : null;
              var range = (minT != null && maxT != null) ? (minT + '~' + maxT + '°C') : '';
              renderClockWeather(geo.city || '—', weatherCodeToEmoji(code), range);
            });
          })
          .catch(function () {
            renderClockWeather('—', '', '');
          });
      }

      function tickClockDisplay() {
        var now = getAppDate();
        var key = minuteKey(now);
        if (key === lastClockMinuteKey) return;
        lastClockMinuteKey = key;
        renderClockTime(now);
        renderClockDate(now);
        maybeRelayoutClockSheep(now);
      }

      function initClockPage() {
        lastSheepHourKey = null;
        clockSheepLaidOut = false;
        clockSheepPendingLayout = false;
        rotateClockQuote();
        tickClockDisplay();
        loadClockWeather();
        layoutClockSheepIfNeeded({ force: true });

        /** 每分钟局部刷新；对齐到下一整分后再固定 60s 间隔 */
        var msToNextMinute = 60000 - (Date.now() % 60000) + 50;
        setTimeout(function () {
          tickClockDisplay();
          setInterval(tickClockDisplay, 60000);
        }, msToNextMinute);
      }

      /** —— Tab 3 番茄上班钟 —— */
      var POMO_STORAGE_KEY = 'pomo_timer';

      var POMO_TIERS = {
        tall: { focusMin: 25, breakMin: 5, boxSize: 'small', label: 'Tall' },
        grande: { focusMin: 50, breakMin: 10, boxSize: 'medium', label: 'Grande' },
        venti: { focusMin: 90, breakMin: 15, boxSize: 'large', label: 'Venti' },
      };

      var POMO_STATUS_POOLS = {
        idle: ['来杯咖啡，精神加倍～', '今天喝什么，我们有中杯、大杯、超大杯～'],
        focus: ['专注中～', '沉浸式工作ing', '别来烦我！'],
        break: ['休息一下～', '喝口水～咕噜咕噜咕噜', '上个厕所～', '摸会儿鱼～'],
        done: ['人生无解，多喝拿铁', '手握馥芮白，早晚发大财', '有事启奏，美式退朝', '浓缩加倍，加班不累'],
      };

      var pomoState = null;
      var pomoTickTimer = null;

      function defaultPomoState() {
        return {
          phase: 'idle',
          tier: 'tall',
          remainingMs: POMO_TIERS.tall.focusMin * 60000,
          running: false,
          statusMessage: '',
          updatedAt: Date.now(),
        };
      }

      function pickPomoStatus(poolKey) {
        var pool = POMO_STATUS_POOLS[poolKey];
        if (!pool || !pool.length) return '';
        return pool[Math.floor(Math.random() * pool.length)];
      }

      function tierFocusMs(tier) {
        return POMO_TIERS[tier].focusMin * 60000;
      }

      function tierBreakMs(tier) {
        return POMO_TIERS[tier].breakMin * 60000;
      }

      function formatPomoCountdown(ms) {
        var totalSeconds = Math.max(0, Math.ceil(ms / 1000));
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        return pad2(minutes) + ':' + pad2(seconds);
      }

      function formatBreakHint(tier) {
        return '+' + POMO_TIERS[tier].breakMin + 'min';
      }

      function getPomoRemainingMs(state) {
        if (!state.running) return state.remainingMs;
        var elapsed = Date.now() - state.updatedAt;
        return Math.max(0, state.remainingMs - elapsed);
      }

      function loadPomoState() {
        try {
          var raw = localStorage.getItem(POMO_STORAGE_KEY);
          if (!raw) return defaultPomoState();
          var parsed = JSON.parse(raw);
          if (!parsed || !parsed.phase) return defaultPomoState();
          if (parsed.phase === 'done') {
            parsed.tier = null;
            parsed.remainingMs = 0;
            parsed.running = false;
          }
          if (parsed.phase === 'idle' && !parsed.tier) {
            parsed.tier = 'tall';
            parsed.remainingMs = tierFocusMs('tall');
          }
          if (!parsed.statusMessage) {
            parsed.statusMessage = pickPomoStatus(parsed.phase === 'done' ? 'done' : 'idle');
          }
          parsed.updatedAt = parsed.updatedAt || Date.now();
          return parsed;
        } catch (e) {
          return defaultPomoState();
        }
      }

      function savePomoState(state) {
        localStorage.setItem(POMO_STORAGE_KEY, JSON.stringify(state));
      }

      function syncPomoRemaining(state) {
        if (state.running) {
          state.remainingMs = getPomoRemainingMs(state);
          state.running = false;
        }
        state.updatedAt = Date.now();
      }

      function setPomoStatus(poolKey, state) {
        state.statusMessage = pickPomoStatus(poolKey);
      }

      function grantPomoWorker(tier) {
        var workers = getTodayWorkers();
        var pick = STARTER_WORKERS[Math.floor(Math.random() * STARTER_WORKERS.length)];
        var size = POMO_TIERS[tier].boxSize;
        workers.push({ id: pick, size: size });
        saveTodayWorkers(workers);

        var unlocked = getUnlockedList();
        if (unlocked.indexOf(pick) === -1) {
          unlocked.push(pick);
          saveUnlockedList(unlocked);
        }

        renderTodayWorkers(workers);
      }

      function pomoIsActivePhase(phase) {
        return phase === 'focus' || phase === 'break';
      }

      function applyPomoQuote(quote) {
        var textEl = document.getElementById('pomo-quote-text');
        var authorEl = document.getElementById('pomo-quote-author');
        if (!textEl || !authorEl || !quote) return;
        textEl.textContent = quote.text;
        authorEl.textContent = '— ' + quote.author;
      }

      function rotatePomoQuote() {
        applyPomoQuote(pickRandomQuote());
      }

      function renderPomoSizeSelection(state) {
        var sizesEl = document.getElementById('pomo-sizes');
        var buttons = document.querySelectorAll('.pomo-size-btn');
        if (!sizesEl) return;

        sizesEl.classList.toggle('is-hidden', pomoIsActivePhase(state.phase));

        buttons.forEach(function (btn) {
          var tier = btn.getAttribute('data-tier');
          var selected = !!state.tier && tier === state.tier;
          btn.classList.toggle('is-selected', selected);
          btn.setAttribute('aria-checked', selected ? 'true' : 'false');
        });
      }

      function renderPomoControls(state) {
        var active = pomoIsActivePhase(state.phase);
        var paused = active && !state.running;
        var btnStart = document.getElementById('pomo-btn-start');
        var btnPause = document.getElementById('pomo-btn-pause');
        var btnReset = document.getElementById('pomo-btn-reset');
        var btnReselect = document.getElementById('pomo-btn-reselect');

        if (!btnStart) return;

        btnStart.classList.toggle('is-hidden', !((state.phase === 'idle' || state.phase === 'done') || paused));
        btnPause.classList.toggle('is-hidden', !(active && state.running));
        btnReset.classList.toggle('is-hidden', !active);
        btnReselect.classList.toggle('is-hidden', !active);

        var canStart = (state.phase === 'idle' && !!state.tier) || paused;
        btnStart.disabled = !canStart;
        btnStart.querySelector('span').textContent = paused ? '继续' : '开始';
        btnStart.setAttribute('aria-label', paused ? '继续' : '开始');
      }

      function renderPomoDisplay(state) {
        var timeEl = document.getElementById('pomo-time');
        var hintEl = document.getElementById('pomo-break-hint');
        var statusEl = document.getElementById('pomo-status-text');
        if (!timeEl || !hintEl || !statusEl) return;

        var remaining = getPomoRemainingMs(state);

        if (state.phase === 'done') {
          timeEl.textContent = '00:00';
        } else if (state.phase === 'idle') {
          timeEl.textContent = state.tier ? formatPomoCountdown(tierFocusMs(state.tier)) : '00:00';
        } else {
          timeEl.textContent = formatPomoCountdown(remaining);
        }

        var showHint = !!state.tier && state.phase !== 'break' && state.phase !== 'done';
        hintEl.classList.toggle('is-hidden', !showHint);
        if (showHint) {
          hintEl.textContent = formatBreakHint(state.tier);
        }

        statusEl.textContent = state.statusMessage || pickPomoStatus('idle');
        renderPomoSizeSelection(state);
        renderPomoControls(state);
      }

      function commitPomoState(state) {
        savePomoState(state);
        renderPomoDisplay(state);
      }

      function enterPomoIdle(state, options) {
        options = options || {};
        state.phase = 'idle';
        state.running = false;
        state.tier = options.tier !== undefined ? options.tier : 'tall';
        state.remainingMs = state.tier ? tierFocusMs(state.tier) : 0;
        state.updatedAt = Date.now();
        if (options.pickStatus !== false) {
          setPomoStatus('idle', state);
        }
      }

      function enterPomoDone(state) {
        state.phase = 'done';
        state.tier = null;
        state.remainingMs = 0;
        state.running = false;
        state.updatedAt = Date.now();
        setPomoStatus('done', state);
      }

      function startPomoFocus(state) {
        if (!state.tier) return;
        state.phase = 'focus';
        state.remainingMs = tierFocusMs(state.tier);
        state.running = true;
        state.updatedAt = Date.now();
        setPomoStatus('focus', state);
      }

      function startPomoBreak(state) {
        state.phase = 'break';
        state.remainingMs = tierBreakMs(state.tier);
        state.running = true;
        state.updatedAt = Date.now();
        setPomoStatus('break', state);
      }

      function handlePomoPhaseComplete(state) {
        if (state.phase === 'focus') {
          startPomoBreak(state);
          commitPomoState(state);
          return;
        }

        if (state.phase === 'break') {
          var completedTier = state.tier;
          grantPomoWorker(completedTier);
          enterPomoDone(state);
          commitPomoState(state);
        }
      }

      function tickPomoTimer() {
        if (!pomoState || !pomoState.running) return;

        var remaining = getPomoRemainingMs(pomoState);
        if (remaining <= 0) {
          syncPomoRemaining(pomoState);
          pomoState.remainingMs = 0;
          handlePomoPhaseComplete(pomoState);
          savePomoState(pomoState);
          return;
        }

        renderPomoDisplay(pomoState);
        savePomoState(pomoState);
      }

      function ensurePomoTick() {
        if (pomoTickTimer) return;
        pomoTickTimer = setInterval(tickPomoTimer, 1000);
      }

      function onPomoStart() {
        syncPomoRemaining(pomoState);

        if (pomoState.phase === 'idle' || pomoState.phase === 'done') {
          if (!pomoState.tier) return;
          if (pomoState.phase === 'done') {
            pomoState.phase = 'idle';
          }
          startPomoFocus(pomoState);
        } else if (pomoIsActivePhase(pomoState.phase) && !pomoState.running) {
          pomoState.running = true;
          pomoState.updatedAt = Date.now();
        }

        commitPomoState(pomoState);
        ensurePomoTick();
      }

      function onPomoPause() {
        if (!pomoIsActivePhase(pomoState.phase) || !pomoState.running) return;
        syncPomoRemaining(pomoState);
        commitPomoState(pomoState);
      }

      function onPomoReset() {
        if (!pomoIsActivePhase(pomoState.phase)) return;
        syncPomoRemaining(pomoState);
        pomoState.running = true;
        pomoState.updatedAt = Date.now();
        if (pomoState.phase === 'focus') {
          pomoState.remainingMs = tierFocusMs(pomoState.tier);
        } else {
          pomoState.remainingMs = tierBreakMs(pomoState.tier);
        }
        commitPomoState(pomoState);
        ensurePomoTick();
      }

      function onPomoReselect() {
        if (!pomoIsActivePhase(pomoState.phase)) return;
        enterPomoIdle(pomoState, { tier: 'tall' });
        commitPomoState(pomoState);
      }

      function onPomoTierSelect(tier) {
        if (pomoIsActivePhase(pomoState.phase)) return;
        if (!POMO_TIERS[tier]) return;

        pomoState.tier = tier;
        if (pomoState.phase === 'done') {
          pomoState.phase = 'idle';
        }
        pomoState.remainingMs = tierFocusMs(tier);
        pomoState.running = false;
        pomoState.updatedAt = Date.now();
        commitPomoState(pomoState);
      }

      function reconcilePomoState(state) {
        if (!pomoIsActivePhase(state.phase)) return state;

        var remaining = getPomoRemainingMs(state);
        var overflow = 0;
        var didTransition = false;

        while (true) {
          if (remaining > 0) {
            state.remainingMs = remaining;
            if (state.running && didTransition) {
              state.updatedAt = Date.now();
            }
            break;
          }

          overflow = -remaining;
          didTransition = true;

          if (state.phase === 'focus') {
            state.phase = 'break';
            state.remainingMs = tierBreakMs(state.tier);
            setPomoStatus('break', state);
            remaining = state.remainingMs - overflow;
            overflow = 0;
            continue;
          }

          if (state.phase === 'break') {
            grantPomoWorker(state.tier);
            enterPomoDone(state);
            break;
          }

          break;
        }

        return state;
      }

      function initPomoPage() {
        pomoState = loadPomoState();
        pomoState = reconcilePomoState(pomoState);

        if (pomoState.phase === 'idle' && !pomoState.statusMessage) {
          setPomoStatus('idle', pomoState);
        }

        rotatePomoQuote();
        renderPomoDisplay(pomoState);
        savePomoState(pomoState);

        if (pomoState.running) {
          ensurePomoTick();
        }

        document.getElementById('pomo-btn-start').addEventListener('click', onPomoStart);
        document.getElementById('pomo-btn-pause').addEventListener('click', onPomoPause);
        document.getElementById('pomo-btn-reset').addEventListener('click', onPomoReset);
        document.getElementById('pomo-btn-reselect').addEventListener('click', onPomoReselect);

        document.querySelectorAll('.pomo-size-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            onPomoTierSelect(btn.getAttribute('data-tier'));
          });
        });

        document.addEventListener('visibilitychange', function () {
          if (!pomoState) return;
          if (document.visibilityState === 'hidden') {
            savePomoState(pomoState);
            return;
          }
          pomoState = reconcilePomoState(pomoState);
          renderPomoDisplay(pomoState);
          savePomoState(pomoState);
          if (pomoState.running) ensurePomoTick();
        });

        window.addEventListener('beforeunload', function () {
          if (!pomoState) return;
          savePomoState(pomoState);
        });
      }

      var WORK_CLOCK_KEY = 'work_clock';

      function defaultWorkClock() {
        return { date: null, status: 'idle', elapsedMs: 0, sessionStart: null };
      }

      function loadWorkClock() {
        try {
          var raw = localStorage.getItem(WORK_CLOCK_KEY);
          if (!raw) return defaultWorkClock();
          return JSON.parse(raw);
        } catch (e) {
          return defaultWorkClock();
        }
      }

      function saveWorkClock(state) {
        localStorage.setItem(WORK_CLOCK_KEY, JSON.stringify(state));
      }

      function resetWorkClockIfNewDay(state, todayKey) {
        if (state.date && state.date !== todayKey) {
          return defaultWorkClock();
        }
        return state;
      }

      function getWorkElapsedMs(state) {
        if (state.status === 'working' && state.sessionStart) {
          return state.elapsedMs + (Date.now() - state.sessionStart);
        }
        return state.elapsedMs;
      }

      function formatWorkTime(ms) {
        var totalSeconds = Math.floor(ms / 1000);
        var hours = Math.floor(totalSeconds / 3600);
        var minutes = Math.floor((totalSeconds % 3600) / 60);
        var seconds = totalSeconds % 60;
        return pad2(hours) + ':' + pad2(minutes) + ':' + pad2(seconds);
      }

      function renderWorkClock(state) {
        var label = document.getElementById('work-clock-label');
        var sep = document.getElementById('work-clock-sep');
        var btn = document.getElementById('btn-work-clock');

        if (state.status === 'idle') {
          label.textContent = '';
          sep.classList.remove('is-visible');
          sep.textContent = '';
          btn.textContent = '上班打卡';
          btn.setAttribute('aria-label', '上班打卡');
        } else if (state.status === 'working') {
          label.textContent = '你已经上班 ' + formatWorkTime(getWorkElapsedMs(state));
          sep.textContent = '｜';
          sep.classList.add('is-visible');
          btn.textContent = '下班打卡';
          btn.setAttribute('aria-label', '下班打卡');
        } else if (state.status === 'off') {
          label.textContent = '下班啦～';
          sep.textContent = '｜';
          sep.classList.add('is-visible');
          btn.textContent = '上班打卡';
          btn.setAttribute('aria-label', '上班打卡');
        }
      }

      function initWorkClock() {
        var state = resetWorkClockIfNewDay(loadWorkClock(), dateKey(getAppDate()));
        saveWorkClock(state);
        renderWorkClock(state);

        var btn = document.getElementById('btn-work-clock');
        btn.addEventListener('click', function () {
          var todayKey = dateKey(getAppDate());
          state = resetWorkClockIfNewDay(state, todayKey);

          if (state.status === 'idle') {
            state.date = todayKey;
            state.status = 'working';
            state.elapsedMs = 0;
            state.sessionStart = Date.now();
            grantStarterWorkerIfNeeded();
            syncDailyWorkers(getAppDate());
          } else if (state.status === 'off') {
            state.date = todayKey;
            state.status = 'working';
            state.sessionStart = Date.now();
          } else if (state.status === 'working') {
            state.elapsedMs = getWorkElapsedMs(state);
            state.sessionStart = null;
            state.status = 'off';
          }

          saveWorkClock(state);
          renderWorkClock(state);
        });

        setInterval(function () {
          var todayKey = dateKey(getAppDate());
          var prevStatus = state.status;
          state = resetWorkClockIfNewDay(state, todayKey);
          if (prevStatus !== state.status || state.status === 'working') {
            saveWorkClock(state);
            renderWorkClock(state);
          }
        }, 1000);
      }

      function initApp() {
        var today = getAppDate();

        loadActiveScene().then(function () {
          renderCalendar(today);
          syncDailyWorkers(today);
          initPageNav();
          initWorkClock();
          initClockPage();
          initPomoPage();
          initCoverMidnightWatch();
        });

        window.addEventListener('resize', updateWorkersOverflow);
      }

      window.triggerScreenFlash = triggerScreenFlash;
      window.getAppDate = getAppDate;

      initApp();
    })();
  </script>
</body>
</html>
